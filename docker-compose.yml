version: '3.8'

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: dama-api
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_PASS: ${MONGODB_PASS}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      PORT: 8080
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: dama-web
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped
