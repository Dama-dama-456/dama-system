components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserInfo"
      required:
        - success
        - token
        - user

    MeResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserInfo"
      required:
        - user

    UserInfo:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
      required:
        - id
        - username
        - fullName
        - role

    DashboardStats:
      type: object
      properties:
        employees:
          type: integer
        consultants:
          type: integer
        trainees:
          type: integer
        companies:
          type: integer
        nonprofits:
          type: integer
        services:
          type: integer
        projects:
          type: integer
        activeProjects:
          type: integer
        activeEmployees:
          type: integer
        availableConsultants:
          type: integer
      required:
        - employees
        - consultants
        - trainees
        - companies
        - nonprofits
        - services
        - projects
        - activeProjects
        - activeEmployees
        - availableConsultants

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        errors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
      required:
        - success

    Employee:
      type: object
      properties:
        _id:
          type: string
        employeeId:
          type: string
        fullName:
          type: string
        nationalId:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        position:
          type: string
        department:
          type: string
        dateOfJoining:
          type: string
        salary:
          type: number
        status:
          type: string
        createdAt:
          type: string
      required:
        - _id
        - fullName

    EmployeeInput:
      type: object
      properties:
        fullName:
          type: string
        nationalId:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        position:
          type: string
        department:
          type: string
        dateOfJoining:
          type: string
        salary:
          type: number
        status:
          type: string
      required:
        - fullName

    Consultant:
      type: object
      properties:
        _id:
          type: string
        consultantId:
          type: string
        fullName:
          type: string
        nationalId:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        specialty:
          type: string
        academicRank:
          type: string
        consultingField:
          type: string
        availability:
          type: string
        createdAt:
          type: string
      required:
        - _id
        - fullName

    ConsultantInput:
      type: object
      properties:
        fullName:
          type: string
        nationalId:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        specialty:
          type: string
        academicRank:
          type: string
        consultingField:
          type: string
        availability:
          type: string
      required:
        - fullName
        - email

    Trainee:
      type: object
      properties:
        _id:
          type: string
        fullName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        university:
          type: string
        major:
          type: string
        trainingType:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        department:
          type: string
        finalGrade:
          type: string
        createdAt:
          type: string
      required:
        - _id
        - fullName

    TraineeInput:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        university:
          type: string
        major:
          type: string
        trainingType:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        department:
          type: string
        finalGrade:
          type: string
      required:
        - fullName

    Company:
      type: object
      properties:
        _id:
          type: string
        companyName:
          type: string
        crNumber:
          type: string
        industry:
          type: string
        companySize:
          type: string
        address:
          type: string
        contactPhone:
          type: string
        contactEmail:
          type: string
        createdAt:
          type: string
      required:
        - _id
        - companyName

    CompanyInput:
      type: object
      properties:
        companyName:
          type: string
        crNumber:
          type: string
        industry:
          type: string
        companySize:
          type: string
        address:
          type: string
        contactPhone:
          type: string
        contactEmail:
          type: string
      required:
        - companyName

    Nonprofit:
      type: object
      properties:
        _id:
          type: string
        establishmentName:
          type: string
        sector:
          type: string
        licenseNumber:
          type: string
        address:
          type: string
        website:
          type: string
        contactPhone:
          type: string
        contactEmail:
          type: string
        createdAt:
          type: string
      required:
        - _id
        - establishmentName

    NonprofitInput:
      type: object
      properties:
        establishmentName:
          type: string
        sector:
          type: string
        licenseNumber:
          type: string
        address:
          type: string
        website:
          type: string
        contactPhone:
          type: string
        contactEmail:
          type: string
      required:
        - establishmentName

    Service:
      type: object
      properties:
        _id:
          type: string
        serviceName:
          type: string
        serviceCategory:
          type: string
        description:
          type: string
        basePrice:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - _id
